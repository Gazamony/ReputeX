<!DOCTYPE html>
<html>
<head>
  <title>ReputeX</title>
</head>

<body>

<h1>ReputeX</h1>

<button id="connect">Connect Wallet</button>

<br><br>

<input id="achievement" placeholder="Enter achievement">

<button id="claim">Claim Achievement</button>

<script src="https://cdn.ethers.io/lib/ethers-6.9.0.umd.min.js"></script>

<script>
const contractAddress = "0xC40C7A54148f24C1f23533733E1d54070fC17D6a";

const abi = [
  "function claim(string _title)"
];

let provider, signer, contract;

document.getElementById("connect").onclick = async () => {
  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  alert("Wallet Connected");
};

document.getElementById("claim").onclick = async () => {
  const text = document.getElementById("achievement").value;

  contract = new ethers.Contract(contractAddress, abi, signer);

  const tx = await contract.claim(text);
  await tx.wait();

  alert("Achievement stored on IOPn!");
};
</script>

</body>
</html>
